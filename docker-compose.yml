services:
  postgres:
    image: postgres:16-alpine
    container_name: bytehub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bytehub}
      POSTGRES_USER: ${POSTGRES_USER:-bytehub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bytehub_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - bytehub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bytehub_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bytehub_postgres_data:
