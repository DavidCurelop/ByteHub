name: Auto-merge Copilot sub-PRs

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'copilot-swe-agent[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge Copilot sub-PR
        run: gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
