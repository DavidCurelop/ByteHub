name: Auto-apply Copilot Suggestions

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  handle-copilot-review:
    if: github.event.review.user.login == 'Copilot'
    runs-on: ubuntu-latest
    steps:
      - name: Check cycle count
        id: check-cycles
        run: |
          COUNT=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '[.[] | select(.body | startswith("@copilot open a new pull request"))] | length')
          echo "cycle_count=$COUNT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if review has comments
        id: check-comments
        run: |
          COUNT=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/${{ github.event.review.id }}/comments --jq 'length')
          echo "comment_count=$COUNT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for high risk comments
        id: check-severity
        run: |
          HIGH=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/${{ github.event.review.id }}/comments \
            --jq '[.[] | select(.body | test("security|vulnerability|injection|PII|password|secret|token|exposed|unsafe|XSS|CSRF|auth|permission|privilege|data leak|sensitive"; "i"))] | length')
          echo "high_count=$HIGH" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ask Copilot to fix high risk issues
        if: steps.check-comments.outputs.comment_count != '0' && steps.check-severity.outputs.high_count != '0' && steps.check-cycles.outputs.cycle_count < 3
        run: gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "@copilot open a new pull request to apply changes based on the comments in [this thread](https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}#pullrequestreview-${{ github.event.review.id }})"
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Request human review if only low severity comments
        if: steps.check-comments.outputs.comment_count != '0' && steps.check-severity.outputs.high_count == '0'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "ℹ️ Copilot found only low severity comments. Requesting human review."
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-reviewer ${{ vars.REVIEWER_USERNAME }}
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Request human review if max cycles reached
        if: steps.check-comments.outputs.comment_count != '0' && steps.check-severity.outputs.high_count != '0' && steps.check-cycles.outputs.cycle_count >= 3
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "⚠️ Copilot has cycled 3 times and still has comments. Requesting human review."
          gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-reviewer ${{ vars.REVIEWER_USERNAME }}
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Request human review if no comments
        if: steps.check-comments.outputs.comment_count == '0'
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-reviewer ${{ vars.REVIEWER_USERNAME }}
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}