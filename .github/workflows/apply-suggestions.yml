name: Auto-apply Copilot Suggestions

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-suggestions:
    if: |
      github.event.review.user.login == 'copilot-pull-request-reviewer[bot]' ||
      github.event.review.user.login == 'Copilot' ||
      github.event.review.user.type == 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Ask Copilot to apply its own review
        run: >
          gh pr comment ${{ github.event.pull_request.number }}
          --repo ${{ github.repository }}
          --body "@copilot open a new pull request to apply changes based on the comments in [this thread](https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}#pullrequestreview-${{ github.event.review.id }})"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
