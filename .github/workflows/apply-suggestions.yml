name: Auto-apply Copilot Suggestions

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-suggestions:
    if: github.event.review.user.login == 'Copilot'
    runs-on: ubuntu-latest
    steps:
      - name: Ask Copilot to apply its own review
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "@copilot open a new pull request to apply changes based on the comments in this review"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
